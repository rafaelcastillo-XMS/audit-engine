        <h1>XMS Audit Lab — Free SEO, AEO &amp; GEO Website Audit Tool</h1>

        <p>XMS Audit Lab is a free website audit tool by Xperience AI Marketing Solutions that helps businesses understand and improve their visibility in traditional search engines and AI-powered answer platforms like ChatGPT, Claude, Gemini, and Perplexity. Paste any URL and receive your complete SEO, AEO, and GEO report in under 10 seconds — no account, no credit card, and no installation required.</p>

        <h2>What is XMS Audit Lab and how does it work?</h2>
        <p>XMS Audit Lab analyzes any website URL across three scoring dimensions: SEO (Search Engine Optimization), AEO (Answer Engine Optimization), and GEO (Generative Engine Optimization). To use the tool, paste your website URL into the form on the home page and click Analyze. Our server fetches the live page, parses the HTML, and runs over 35 automated checks to produce a prioritized list of issues and opportunities in under 10 seconds. Results include a numeric score from 0 to 100 for each dimension, plus critical issues, quick wins, and actionable recommendations. You can also export the full report as a PDF to share with clients or stakeholders. The combined overall score is a weighted average: 40% SEO, 30% AEO, and 30% GEO, reflecting the relative importance of each dimension in today's multi-channel search environment.</p>

        <h2>Why isn't my website showing up in ChatGPT or Google AI answers?</h2>
        <p>AI language models like ChatGPT, Claude, and Gemini pull content from websites that are well-structured, authoritative, and clearly answer specific questions. If your page lacks schema markup, has thin or vague content, blocks AI crawlers in robots.txt, or uses poor heading structure, AI models will skip your site in favor of better-optimized competitors. Our GEO score identifies exactly which signals are missing — from the presence of a llms.txt file and AI crawler accessibility to brand authority signals, external outbound citations, and Open Graph entity clarity. Addressing these gaps can significantly increase how often AI tools cite or recommend your business when users ask relevant questions. The first step is knowing your baseline score.</p>

        <h2>What does the SEO score measure?</h2>
        <p>The SEO score evaluates the technical fundamentals that search engines use to understand, crawl, and rank your page. It checks your title tag (optimal length: 30 to 60 characters), meta description (optimal: 120 to 160 characters), H1 tag presence and uniqueness, canonical URL tag, HTTPS status, XML sitemap availability at /sitemap.xml or /sitemap_index.xml, robots.txt file, internal link count (three or more is ideal for link equity distribution), external link count (at least one outbound link is recommended), and overall content depth measured through word count — pages with 300 or more words score better, and 700 or more words earns full points. A perfect SEO score of 100 means every technical SEO fundamental is in place for maximum search engine visibility and crawlability.</p>

        <h2>How is the AEO score calculated for Answer Engine Optimization?</h2>
        <p>The AEO (Answer Engine Optimization) score measures how well your content is optimized to appear in featured snippets, voice search results, and AI-generated answers. Key scoring factors include FAQ schema markup using JSON-LD structured data (25 points — the single highest-value AEO signal), question-formatted headings that begin with words like what, how, why, when, where, who, which, can, does, do, is, or are (up to 20 points for three or more question headings), content depth above 500 words (10 points) and above 1000 words (5 additional points), any schema markup presence beyond just FAQ (15 points), at least three H2 subheadings for clear content structure (10 points), and Open Graph metadata including og:title, og:description, and og:type tags (up to 15 points). Maximizing your AEO score means structuring content explicitly to answer questions in clear, well-marked sections that answer engines can parse and surface.</p>

        <h2>What does GEO mean — Generative Engine Optimization?</h2>
        <p>GEO, or Generative Engine Optimization, is the discipline of optimizing your website so AI-powered tools like ChatGPT, Perplexity, Google Gemini, Microsoft Copilot, and Anthropic Claude can discover, understand, trust, and cite your content when users ask related questions. The GEO score rewards sites for maintaining a llms.txt file at the root of the domain (20 points), not blocking AI crawlers such as GPTBot, ClaudeBot, Google-Extended, and PerplexityBot in robots.txt (15 points), structured data and FAQ schema markup (up to 20 points combined), trust signals including author information on the page, a contact page, and an about page (7, 7, and 6 points respectively), three or more outbound citations to authoritative external sources (10 points), and entity and brand clarity through Open Graph site name and combined og:title plus og:description (5 and 10 points respectively). A strong GEO score directly increases AI-driven referrals, brand mentions, and organic citations from AI assistants.</p>

        <h2>Can I use this to audit client websites before a sales pitch?</h2>
        <p>Yes — auditing prospects before a sales meeting is one of the most popular use cases for XMS Audit Lab. Run a 10-second audit on a prospect domain before your call and walk in knowing their exact weak points: missing canonical tags, blocked AI crawlers in robots.txt, absent FAQ schema, poor AEO signals, thin content, or no structured data of any kind. The built-in PDF export produces a professional, visually polished report with scores, critical issues, and prioritized recommendations that you can present during the meeting without any additional formatting or design work. Arriving with concrete audit data positions you as a knowledgeable, data-driven consultant before the engagement even begins, and gives you a clear upsell path for fixing the identified issues.</p>

        <h2>How long does a website audit take with XMS Audit Lab?</h2>
        <p>A full audit completes in under 10 seconds from the moment you click analyze. The tool fetches and processes the live version of your page, checks robots.txt and sitemap availability from the server, and computes all 35-plus signals in parallel. The complete report — including the SEO score, AEO score, GEO score, overall combined score, list of critical issues ranked by severity, quick wins, and specific actionable recommendations — is displayed almost instantly in your browser. Results are saved automatically in your browser's localStorage so you can review past audits at any time. There is no account required and no scheduled crawl — every audit is on demand and reflects the current live state of the page.</p>
